# Litehost Panel — default server block
# Written by install.sh to: /etc/nginx/sites-available/litehost-panel.conf

server {
    listen 80 default_server;
    server_name _;

    # Panel proxy — forwards all traffic to Node.js (preview is handled there too)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    access_log /var/log/nginx/litehost-panel.log;
    error_log  /var/log/nginx/litehost-panel-error.log;
}
